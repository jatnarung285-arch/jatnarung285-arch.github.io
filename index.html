<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องคำนวณเงินกู้รายวัน</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 450px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219653; }
        .result { margin-top: 20px; padding: 15px; background: #e8f8f5; border-radius: 5px; display: none; }
        .result p { margin: 5px 0; font-size: 16px; }
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณเงินกู้รายวัน</h2>
    
    <div class="form-group">
        <label>เงินต้นที่ต้องการกู้ (บาท):</label>
        <input type="number" id="loanAmount" value="10000">
    </div>
    
    <div class="form-group">
        <label>อัตราดอกเบี้ยต่อปี (%):</label>
        <input type="number" id="interestRate" value="24" step="0.1">
    </div>
    
    <div class="form-group">
        <label>ระยะเวลาผ่อน (วัน):</label>
        <input type="number" id="loanTerm" value="30">
    </div>
    
    <button onclick="calculateLoan()">คำนวณยอดผ่อน</button>
    
    <div class="result" id="resultBox">
        <p>ต้องผ่อนจ่ายวันละ: <span id="dailyPayment" class="highlight" style="font-size: 22px;">0</span> บาท</p>
        <p>รวมดอกเบี้ยทั้งหมด: <span id="totalInterest">0</span> บาท</p>
        <p>รวมยอดเงินที่ต้องคืนทั้งหมด: <span id="totalPayable">0</span> บาท</p>
    </div>
</div>

<script>
function calculateLoan() {
    let P = parseFloat(document.getElementById('loanAmount').value);
    let annualRate = parseFloat(document.getElementById('interestRate').value);
    let N = parseInt(document.getElementById('loanTerm').value);
    
    if (isNaN(P) || isNaN(annualRate) || isNaN(N) || P <= 0 || N <= 0) {
        alert("กรุณากรอกข้อมูลให้ถูกต้อง");
        return;
    }

    // แปลงดอกเบี้ยต่อปีเป็นดอกเบี้ยต่อวัน
    let r = (annualRate / 100) / 365;
    
    // สูตรคำนวณยอดผ่อนรายวันเท่ากันทุกงวด (Amortization สูตรลดต้นลดดอก)
    let dailyPay = (P * r * Math.pow(1 + r, N)) / (Math.pow(1 + r, N) - 1);
    
    let totalPay = dailyPay * N;
    let totalInterest = totalPay - P;
    
    // แสดงผลลัพธ์
    document.getElementById('dailyPayment').innerText = dailyPay.toFixed(2);
    document.getElementById('totalInterest').innerText = totalInterest.toFixed(2);
    document.getElementById('totalPayable').innerText = totalPay.toFixed(2);
    
    document.getElementById('resultBox').style.display = 'block';
}
</script>

</body>
</html>
